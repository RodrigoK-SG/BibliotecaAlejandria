<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librería de Alejandría - Mi Cuenta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body class="bg-light">

    <div th:replace="~{componentes/componente :: navbar}"></div>

    <div class="container mt-4 mb-5">
        <div class="row g-4">
            
            <div class="col-md-3">
                <div class="mb-3">
                    <a href="/tienda" class="text-decoration-none text-muted small fw-bold">
                        <i class="bi bi-chevron-left me-1"></i> Volver a la tienda
                    </a>
                </div>

                <div class="card border-0 shadow-sm p-2 bg-white" style="border-radius: 12px;">
                    <div class="p-2 mb-2">
                        <h6 class="text-uppercase fw-bold text-secondary m-0 small" style="letter-spacing: 1px;">Mi Cuenta</h6>
                    </div>
                    <div class="list-group list-group-flush" id="profileTabs">
                        <button class="list-group-item list-group-item-action border-0 rounded-2 p-3" 
                                th:classappend="${param.cambioExitoso == null and param.errorPassword == null} ? 'active' : ''" 
                                data-tab="tab-pedidos">
                            <i class="bi bi-box-seam me-3 text-secondary"></i>Mis Pedidos
                        </button>
                        
                        <button class="list-group-item list-group-item-action border-0 rounded-2 p-3" 
                                th:classappend="${param.cambioExitoso != null or param.errorPassword != null} ? 'active' : ''" 
                                data-tab="tab-ajustes">
                            <i class="bi bi-gear me-3 text-secondary"></i>Ajustes de Cuenta
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-md-9">
                <div class="card p-4 mb-4 border-0 shadow-sm" style="background-color: #f8fafc; border-radius: 12px;">
                    <div class="d-flex align-items-center gap-4">
                        <div class="bg-white rounded-circle shadow-sm d-flex align-items-center justify-content-center" style="width: 70px; height: 70px;">
                            <i class="bi bi-person" style="font-size: 2.5rem; color: #c86b66;"></i>
                        </div>
                        <div>
                            <h4 class="fw-bold m-0 text-dark mb-1" th:text="${usuario.nombreCompleto}">Nombre</h4>
                            <p class="text-muted m-0 small">
                                Correo: <span th:text="${usuario.email}">email@ejemplo.com</span>
                            </p>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm p-4 bg-white min-vh-50" style="border-radius: 12px;">
                    
                    <div id="tab-pedidos" class="nav-tab-content" th:classappend="${param.cambioExitoso == null and param.errorPassword == null} ? 'active' : 'd-none'">
                        <h5 class="fw-bold text-dark mb-4" style="font-family: 'Georgia', serif;">Historial de Pedidos Online</h5>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle border-light">
                                <thead class="table-light">
                                    <tr class="small text-muted">
                                        <th class="fw-normal">N° Pedido</th>
                                        <th class="fw-normal">Fecha</th>
                                        <th class="fw-normal">Total</th>
                                        <th class="fw-normal">Estado</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="pedido : ${listaPedidos}">
                                        <td class="fw-bold text-dark small" th:text="'#WEB-' + ${pedido.id}">#WEB-001</td>
                                        <td class="small" th:text="${#temporals.format(pedido.fechaPedido, 'dd/MM/yyyy')}">Fecha</td>
                                        <td class="fw-bold text-dark small" th:text="'S/ ' + ${pedido.total}">S/ 0.00</td>
                                        <td><span class="badge bg-success bg-opacity-10 text-success px-3 py-1 rounded-pill fw-normal" th:text="${pedido.estadoActual}">PAGADO</span></td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(listaPedidos)}">
                                        <td colspan="4" class="text-center py-4 text-muted small">No registras ninguna compra online.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div id="tab-ajustes" class="nav-tab-content" th:classappend="${param.cambioExitoso != null or param.errorPassword != null} ? 'active' : 'd-none'">
                        <h5 class="fw-bold text-dark mb-4" style="font-family: 'Georgia', serif;">Datos Personales</h5>
                        <form th:action="@{/tienda/perfil/actualizar}" method="POST">
                            
                            <div th:if="${param.cambioExitoso}" class="alert alert-success py-2 small text-center mb-3">
                                <i class="bi bi-check-circle-fill me-1"></i> ¡Perfil actualizado con éxito!
                            </div>
                            <div th:if="${param.errorPassword}" class="alert alert-danger py-2 small text-center mb-3">
                                <i class="bi bi-exclamation-triangle-fill me-1"></i> La contraseña actual es incorrecta.
                            </div>

                            <div class="row g-3 mb-4">
                                <div class="col-md-12">
                                    <label class="form-label small text-muted">Nombre / Razón Social</label>
                                    <input type="text" class="form-control p-2 bg-light border-light" name="nombreRazonSocial" th:value="${usuario.nombreCompleto}" required style="border-radius: 8px;">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small text-muted">Teléfono Celular</label>
                                    <input type="text" class="form-control p-2 bg-light border-light" name="telefono" th:value="${cliente.telefono}" placeholder="Ej. 999888777" style="border-radius: 8px;">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small text-muted">Correo Electrónico</label>
                                    <input type="email" class="form-control p-2 bg-light border-light text-muted" name="emailContacto" th:value="${usuario.email}" required readonly style="border-radius: 8px;">
                                </div>
                            </div>
                            
                            <hr class="opacity-10 my-4">
                            
                            <h5 class="fw-bold text-dark mb-3" style="font-family: 'Georgia', serif;">Seguridad (Opcional)</h5>
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label small text-muted">Contraseña actual</label>
                                    <input type="password" name="passwordActual" class="form-control p-2 bg-light border-light" placeholder="********" style="border-radius: 8px;">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small text-muted">Nueva Contraseña</label>
                                    <input type="password" name="passwordNueva" class="form-control p-2 bg-light border-light" placeholder="********" style="border-radius: 8px;">
                                </div>
                            </div>

                            <div class="text-end">
                                <button type="submit" class="btn text-white fw-bold px-4 py-2" style="background-color: #c86b66; border-radius: 8px;">
                                    Guardar Cambios
                                </button>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{componentes/componente :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/funciones.js"></script>
</body>
</html>
