<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Finalizar Compra - Librería de Alejandría</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilos.css">
    <link rel="stylesheet" href="/css/pagos.css">
</head>
<body class="bg-light">

    <div th:replace="~{componentes/componente :: navbar}"></div>

    <div class="container mt-4 mb-5">
        <div class="mb-2">
            <a href="/tienda" class="text-decoration-none text-muted small"><i class="bi bi-chevron-left"></i> Volver al catálogo</a>
        </div>
        <h3 class="fw-bold mb-4">Finalizar Compra</h3>
        
        <form th:action="@{/tienda/checkout}" method="POST" id="formCheckout">
            <div class="row g-4">
                
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm p-4 mb-4 bg-white" style="border-radius: 12px;">
                        <h5 class="fw-bold mb-4"><span class="badge rounded-circle me-2" style="background-color: #c86b66; padding: 0.5em 0.7em;">1</span>Información de Envío</h5>
                        
                        <div class="mb-3">
                            <label class="form-label small text-muted fw-bold mb-1">Dirección Completa de Envío</label>
                            <input type="text" name="direccionCompleta" id="inputDireccion" class="form-control" placeholder="Av. Principal 123, Distrito, Ciudad" required>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm p-4 bg-white" style="border-radius: 12px;">
                        <h5 class="fw-bold mb-4"><span class="badge rounded-circle me-2" style="background-color: #c86b66; padding: 0.5em 0.7em;">2</span>Método de Pago</h5>
                        
                        <div class="d-flex flex-column gap-2">
                            <input type="radio" name="metodoPago" id="pagoTarjeta" value="TARJETA_CREDITO" class="custom-radio-input" checked>
                            <label for="pagoTarjeta" class="radio-card w-100 flex-column align-items-start">
                                <div class="d-flex align-items-center w-100 py-1">
                                    <div class="radio-dot"></div>
                                    <i class="bi bi-credit-card-2-front text-dark me-2"></i> <span class="fw-bold small">Tarjeta de Crédito / Débito</span>
                                </div>
                                <div id="panelTarjeta" class="row g-2 w-100 mt-2 ms-4 ps-2 sub-panel-form">
                                    <div class="col-12 mb-2">
                                        <input type="text" id="tarjetaNum" class="form-control form-control-sm" placeholder="Número de Tarjeta (16 dígitos)">
                                    </div>
                                    <div class="col-6">
                                        <input type="text" id="tarjetaFecha" class="form-control form-control-sm" placeholder="MM/AA">
                                    </div>
                                    <div class="col-6">
                                        <input type="text" id="tarjetaCvc" class="form-control form-control-sm" placeholder="CVC">
                                    </div>
                                </div>
                            </label>

                            <input type="radio" name="metodoPago" id="pagoYape" value="YAPE" class="custom-radio-input">
                            <label for="pagoYape" class="radio-card w-100 flex-column align-items-start">
                                <div class="d-flex align-items-center w-100 py-1">
                                    <div class="radio-dot"></div>
                                    <span class="badge text-white me-2 rounded-circle" style="background-color: #742384; padding: 4px 8px;">Y</span> <span class="fw-bold small">Yape</span>
                                </div>
                                <div id="panelYape" class="row g-2 w-100 mt-2 ms-4 ps-2 sub-panel-form">
                                    <div class="col-6"><input type="text" id="yapeTelf" class="form-control form-control-sm" placeholder="Número de Celular"></div>
                                    <div class="col-6"><input type="text" id="yapeCod" class="form-control form-control-sm" placeholder="Código de Aprobación"></div>
                                </div>
                            </label>
                        </div>
                    </div>
                </div> 

                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm p-4 bg-white sticky-top" style="border-radius: 16px;">
                        <h5 class="fw-bold mb-4">Resumen del Pedido</h5>
                        
                        <div id="contenedorItemsResumen">
                            <div th:each="item : ${itemsCarrito}" class="d-flex align-items-center justify-content-between mb-4 border-bottom pb-3">
                                <div class="d-flex align-items-center gap-3">
                                    <img th:src="${item.libro.imagenPortada != null ? item.libro.imagenPortada : 'https://via.placeholder.com/50x75'}" width="50" class="rounded shadow-sm">
                                    <div>
                                        <h6 class="fw-bold mb-0 text-truncate" style="max-width: 140px;" th:text="${item.libro.titulo}">Libro</h6>
                                        <strong class="text-muted small" th:text="${item.cantidad} + ' und x S/ ' + ${item.libro.precioVentaActual}">1 x S/ 0.00</strong>
                                    </div>
                                </div>
                                <div class="fw-bold text-dark" th:text="'S/ ' + ${item.libro.precioVentaActual * item.cantidad}">S/ 0.00</div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between mb-2 small text-muted mt-3">
                            <span>Subtotal</span>
                            <span th:text="'S/ ' + ${subtotal}">S/ 0.00</span>
                        </div>
                        <div class="d-flex justify-content-between mb-2 small text-muted">
                            <span>Costo de Envío (Tarifa Plana)</span>
                            <span>S/ 5.99</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <span class="fw-bold fs-5">Total a Pagar</span>
                            <h4 class="fw-bold m-0 text-danger" th:text="'S/ ' + ${totalReal}">S/ 0.00</h4>
                        </div>
                        
                        <button type="submit" class="btn text-white w-100 py-3 fw-bold shadow-sm" style="background-color: #c86b66; border-radius: 8px;">
                            Confirmar y Pagar Pedido
                        </button>
                        <p class="text-center text-muted mt-3 mb-0" style="font-size: 0.75rem;"><i class="bi bi-lock-fill text-warning"></i> Transacción 100% segura</p>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <div th:replace="~{componentes/componente :: footer}"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/pagos.js"></script>
</body>
</html>
