<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librería de Alejandría - Accesos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>
    <div class="container-fluid min-vh-100 p-0">
        <div class="row g-0 min-vh-100">
            <div class="col-md-6 d-none d-md-block bg-libreria-accesos" style="background: url('https://images.unsplash.com/photo-1507842217343-583bb7270b66') center/cover;"></div>
            
            <div class="col-md-6 d-flex align-items-center justify-content-center py-4" style="background-color: #f8fafc;">
                <div class="card border-0 shadow-lg p-4 m-3 card-acceso" style="max-width: 450px; width: 100%;">
                    
                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-dark-ale" style="color: #8c3f3b; font-family: 'Georgia', serif;">Librería de Alejandría</h3>
                        <p class="text-muted small">Bienvenido a nuestra comunidad lectora</p>
                    </div>

                    <ul class="nav nav-tabs justify-content-center mb-4 border-0 gap-3 nav-tabs-accesos" id="accessTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active fw-bold text-dark border-0 bg-transparent" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-panel" type="button" role="tab" style="border-bottom: 2px solid #8c3f3b !important;">Iniciar Sesión</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link fw-bold text-dark border-0 bg-transparent" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-panel" type="button" role="tab">Crear Cuenta</button>
                        </li>
                    </ul>

                    <div th:if="${param.error}" class="alert alert-danger py-2 small text-center alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-1"></i> Correo o contraseña incorrectos.
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${param.registroExitoso}" class="alert alert-success py-2 small text-center alert-dismissible fade show" role="alert">
                        <i class="bi bi-check-circle-fill me-1"></i> ¡Cuenta creada! Ahora puedes iniciar sesión.
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${param.errorRegistro}" class="alert alert-warning py-2 small text-center alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-circle-fill me-1"></i> El correo ya está en uso.
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${param.emailCambiado}" class="alert alert-info py-2 small text-center alert-dismissible fade show" role="alert">
					    <i class="bi bi-info-circle-fill me-1"></i> Correo actualizado. Por favor, inicia sesión con tu nuevo email.
					    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
					</div>

                    <div class="tab-content" id="accessTabsContent">
                        
                        <div class="tab-pane fade show active" id="login-panel" role="tabpanel">
                            <form th:action="@{/login}" method="POST">
                                <div class="mb-3">
                                    <label for="username" class="form-label small fw-bold text-dark">Correo Electrónico</label>
                                    <input type="email" id="username" name="username" class="form-control bg-light" required>
                                </div>
                                <div class="mb-4">
								    <label for="reg-password" class="form-label small fw-bold text-dark">Contraseña</label>
								    <div class="input-group">
								        <input type="password" id="reg-password" name="password" class="form-control bg-light" placeholder="••••••••" required>
								        <span class="input-group-text bg-light text-muted" id="toggleRegPassword" style="cursor: pointer;">
								            <i class="bi bi-eye"></i>
								        </span>
								    </div>
								</div>
                                <button type="submit" class="btn text-white fw-bold w-100 py-2 shadow-sm mb-3" style="background-color: #8c3f3b;">
                                    Iniciar Sesión
                                </button>
                            </form>
                        </div>

                        <div class="tab-pane fade" id="register-panel" role="tabpanel">
                            <form th:action="@{/registro}" method="POST">
                                <div class="mb-3">
                                    <label class="form-label small fw-bold text-dark">Nombre Completo</label>
                                    <input type="text" name="nombreRazonSocial" class="form-control bg-light" placeholder="Ej: Juan Pérez" required>
                                </div>
                                <div class="row g-2 mb-3">
                                    <div class="col-4">
                                        <label class="form-label small fw-bold text-dark">Tipo</label>
                                        <select name="tipoDocumento" class="form-select bg-light">
                                            <option value="DNI">DNI</option>
                                            <option value="RUC">RUC</option>
                                        </select>
                                    </div>
                                    <div class="col-8">
                                        <label class="form-label small fw-bold text-dark">Número Documento</label>
                                        <input type="text" name="nroDocumento" class="form-control bg-light" required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small fw-bold text-dark">Correo Electrónico</label>
                                    <input type="email" name="email" class="form-control bg-light" required>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label small fw-bold text-dark">Contraseña</label>
                                    <input type="password" name="password" class="form-control bg-light" placeholder="••••••••" required>
                                </div>
                                <button type="submit" class="btn text-white fw-bold w-100 py-2 shadow-sm mb-3" style="background-color: #8c3f3b;">
                                    Registrarse
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/funciones.js"></script>
</body>
</html>
