<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${libro.titulo} + ' | Librería de Alejandría'">Detalle del Libro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .btn-hover-zoom { transition: all 0.3s ease; }
        .btn-hover-zoom:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(200, 107, 102, 0.3); }
        .img-portada-detalle { transition: transform 0.5s ease; border-radius: 12px; }
        .img-portada-detalle:hover { transform: scale(1.02); }
        .card-ficha { background: #fdfcf9; border-left: 4px solid #c86b66; border-radius: 8px; }
    </style>
</head>
<body class="bg-light">

    <div th:replace="~{componentes/componente :: navbar}"></div>

    <div class="container my-5">
        <div class="mb-4">
		    <a href="/tienda"
		       class="btn text-white px-4 py-2 fw-bold shadow-sm"
		       style="background-color: #c86b66; border-radius: 8px;">
		        <i class="bi bi-arrow-left me-2"></i>VOLVER AL CATÁLOGO
		    </a>
		</div>

        <div class="row g-5 bg-white p-4 p-md-5 rounded shadow-sm border border-light">
            <div class="col-md-4 col-lg-3 text-center">
                <img th:src="${libro.imagenPortada != null ? libro.imagenPortada : 'https://via.placeholder.com/300x450'}" 
                     class="img-fluid img-portada-detalle shadow-lg" th:alt="${libro.titulo}">
            </div>

            <div class="col-md-8 col-lg-9">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <h1 class="fw-bold mb-1" style="color: #2c3e50; font-family: 'Georgia', serif;" th:text="${libro.titulo}">Título</h1>
                        <p class="text-muted fs-5 mb-3" th:text="${libro.editorial != null ? libro.editorial.nombre : 'Editorial Alejandría'}">Editorial</p>
                    </div>
                    <div class="d-flex align-items-center">
					    <span th:if="${stock > 5}" class="badge bg-success rounded-pill px-3 py-2">
					        <i class="bi bi-check2-circle me-1"></i> Stock Disponible
					    </span>
					
					    <span th:if="${stock > 0 and stock <= 5}" class="badge bg-warning text-dark rounded-pill px-3 py-2">
					        <i class="bi bi-exclamation-triangle me-1"></i> ¡Quedan pocos! (<span th:text="${stock}"></span>)
					    </span>
					
					    <span th:if="${stock <= 0}" class="badge bg-danger rounded-pill px-3 py-2">
					        <i class="bi bi-x-circle me-1"></i> Agotado
					    </span>
					</div>
                </div>

                <hr class="my-3 opacity-25">

                <div class="row g-3 my-3">
                    <div class="col-12 col-md-4 card-ficha p-3">
                        <small class="text-muted d-block text-uppercase fw-bold">Formato</small>
                        <span class="fw-bold" th:text="${#strings.replace(libro.formato.name(), '_', ' ')}">Tapa Dura</span>
                    </div>
                    <div class="col-12 col-md-4 card-ficha p-3">
                        <small class="text-muted d-block text-uppercase fw-bold">Páginas</small>
                        <span class="fw-bold" th:text="${libro.paginas} + ' pág.'">0</span>
                    </div>
                    <div class="col-12 col-md-4 card-ficha p-3">
                        <small class="text-muted d-block text-uppercase fw-bold">ISBN</small>
                        <span class="fw-bold" th:text="${libro.isbn}">000-000</span>
                    </div>
                </div>

                <div class="mt-4">
                    <span class="text-muted d-block mb-1 fw-bold text-uppercase" style="font-size: 0.8rem;">Precio Exclusivo Online</span>
                    <h2 class="fw-bold text-danger display-6" th:text="'S/ ' + ${libro.precioVentaActual}">S/ 0.00</h2>
                </div>

                <div class="mt-4 p-4 bg-light rounded-3 d-inline-block w-100" style="max-width: 500px;">
                    <form id="formAgregarCarrito" th:action="@{/tienda/carrito/agregar}" method="POST" class="row g-3 align-items-center">
                        <input type="hidden" name="libroId" th:value="${libro.id}" />
                        
                        <div class="col-4 col-md-3">
						    <label class="small fw-bold text-muted mb-1">CANTIDAD</label>
						    <input type="number" name="cantidad" value="1" min="1" 
						           th:max="${stock}" 
						           th:disabled="${stock <= 0}" 
						           class="form-control form-control-lg border-0 shadow-sm" required />
						</div>
						
						<div class="col-8 col-md-9">
						    <label class="d-block mb-1">&nbsp;</label>
						    <button type="submit" class="btn btn-lg text-white fw-bold w-100 btn-hover-zoom" 
						            style="background-color: #c86b66;" 
						            th:disabled="${stock <= 0}">
						        <i class="bi bi-cart-plus me-2"></i> AGREGAR AL CARRITO
						    </button>
						</div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{componentes/componente :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('formAgregarCarrito').addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que la página se recargue y se ponga en blanco

            const form = this;
            const formData = new FormData(form);

            // Enviamos los datos al backend de forma silenciosa
            fetch(form.action, {
                method: 'POST',
                body: new URLSearchParams(formData),
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                }
            })
            .then(async response => {
                const mensajeRespuesta = await response.text();
                
                if (!response.ok) {
                    // Si el servidor responde con error (ej. 400 por falta de stock)
                    throw new Error(mensajeRespuesta);
                }
                
                // Si la respuesta es OK (200), redirigimos al usuario a su carrito
                window.location.href = '/tienda/carrito';
            })
            .catch(error => {
                // Mostramos el mensaje de error en una alerta sin malograr la vista
                alert(error.message);
            });
        });
    </script>
</body>
</html>
