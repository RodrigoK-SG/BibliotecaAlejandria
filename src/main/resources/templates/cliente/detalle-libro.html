<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librería de Alejandría - Detalle del Libro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body class="bg-alejandria-page">

    <div th:replace="~{componentes/componente :: navbar}"></div>

    <div class="container mt-4 mb-5">
        <div class="mb-4">
            <a href="/tienda" class="text-decoration-none text-muted small"><i class="bi bi-chevron-left me-1"></i>Volver al catálogo</a>
        </div>

        <div class="row g-5 bg-white p-4 rounded shadow-sm">
            <div class="col-md-4 text-center">
                <img th:src="${libro.imagenPortada != null ? libro.imagenPortada : 'https://via.placeholder.com/300x450'}" 
                     class="img-fluid rounded shadow-sm mb-3 img-portada-detalle" th:alt="${libro.titulo}">
            </div>

            <div class="col-md-8">
                <h1 class="fw-bold mb-1 font-editorial-titulo" th:text="${libro.titulo}">Título del Libro</h1>
                
                <div class="mb-4 mt-3">
                    <span class="badge bg-success bg-opacity-10 text-success px-3 py-2"><i class="bi bi-check-circle-fill me-1"></i>En Stock disponible</span>
                </div>

                <div class="card p-3 bg-light border-light shadow-sm mb-4">
                    <h6 class="fw-bold mb-3 small text-uppercase text-muted">Ficha Técnica</h6>
                    <div class="row g-3 small">
                        <div class="col-6 col-md-4"><strong>Editorial:</strong> <span th:text="${libro.editorial != null ? libro.editorial.nombre : 'S/E'}">Editorial</span></div>
                        <div class="col-6 col-md-4"><strong>Páginas:</strong> <span th:text="${libro.paginas}">0</span></div>
                        <div class="col-6 col-md-4"><strong>ISBN:</strong> <span th:text="${libro.isbn}">0000000000</span></div>
                        <div class="col-12 mt-2"><strong>Formato:</strong> <span th:text="${#strings.replace(libro.formato.name(), '_', ' ')}">Formato</span></div>
                    </div>
                </div>

                <div class="row g-2 mb-4">
                    <div class="col-md-6">
                        <div class="p-3 rounded border border-danger-subtle bg-white">
                            <span class="small text-muted text-uppercase fw-bold d-block mb-1" style="font-size: 0.7rem;">Precio Exclusivo Online</span>
                            <h3 class="fw-bold m-0 text-danger" th:text="'S/ ' + ${libro.precioVentaActual}">S/ 0.00</h3>
                        </div>
                    </div>
                </div>

                <div class="d-grid" style="max-width: 400px;">
                    <form th:action="@{/tienda/carrito/agregar}" method="POST" class="d-flex gap-2">
                        <input type="hidden" name="libroId" th:value="${libro.id}" />
                        
                        <div style="width: 100px;">
                            <input type="number" name="cantidad" value="1" min="1" class="form-control form-control-lg text-center" required />
                        </div>
                        
                        <button type="submit" class="btn btn-lg text-white fw-bold flex-grow-1" style="background-color: #c86b66; border-radius: 8px; border: none;">
                            <i class="bi bi-cart-plus me-2"></i>Añadir al Carrito
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{componentes/componente :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
